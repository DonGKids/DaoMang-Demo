{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 40px auto;">
    <h2 class="title">📝 用户注册</h2>
    <input id="username" placeholder="请输入用户名">
    <input id="password" type="password" placeholder="请输入密码">
    <input id="student_id" placeholder="请输入学号">
    <input id="college" placeholder="请输入学院">
    <input id="major" placeholder="请输入专业">
    <button class="btn" style="width: 100%;" onclick="register()">注册</button>
    <p style="text-align: center; margin-top: 16px; color: var(--text-light);">
        已有账号？<a href="/login" style="color: var(--primary); text-decoration: none;">立即登录</a>
    </p>
</div>
<script>
function register() {
    post('/register', {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        student_id: document.getElementById('student_id').value,
        college: document.getElementById('college').value,
        major: document.getElementById('major').value
    }, d => {
        d.code === 200 ? location.href = '/login' : alert(d.msg);
    });
}
</script>
{% endblock %}
