<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}导茫犬 - 大学生扫茫平台{% endblock %}</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .nav a {
            color: rgba(255,255,255,0.9);
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav a:hover {
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--primary);
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .list-item {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            margin: 8px 0;
            border-radius: 8px;
            background: #f8fafc;
        }

        .list-item h3 {
            color: var(--text);
            margin-bottom: 6px;
        }

        .list-item p {
            color: var(--text-light);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🐾 导茫犬 · 大学生扫茫信息平台</h2>
        <div class="nav">
            <a href="/">首页</a>
            <a href="/info">信息库</a>
            <a href="/forum">互助论坛</a>
            {% if session.user_id %}
                <a href="/maze">迷茫检测</a>
                <a href="/logout">退出登录</a>
            {% else %}
                <a href="/login">登录</a>
                <a href="/register">注册</a>
            {% endif %}
        </div>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function post(url, data, callback) {
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(data)
            }).then(res => res.json()).then(callback);
        }
    </script>
</body>
</html>
